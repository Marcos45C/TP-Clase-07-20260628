<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Librería del Sur — Catálogo</title>
  <style>
    /* ── Reset y variables ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple-50:  #EEEDFE;
      --purple-200: #AFA9EC;
      --purple-400: #7F77DD;
      --purple-600: #534AB7;
      --purple-900: #26215C;
      --teal-50:    #E1F5EE;
      --teal-600:   #0F6E56;
      --coral-50:   #FAECE7;
      --coral-600:  #993C1D;
      --amber-50:   #FAEEDA;
      --amber-600:  #854F0B;
      --gray-100:   #D3D1C7;
      --gray-400:   #888780;
      --gray-600:   #5F5E5A;
      --bg:         #F1EFE8;
      --surface:    #FFFFFF;
      --text:       #2C2C2A;
      --text-muted: #5F5E5A;
      --border:     rgba(0,0,0,0.10);
      --radius-sm:  6px;
      --radius-md:  10px;
      --radius-lg:  14px;
      --shadow:     0 1px 4px rgba(0,0,0,0.08);
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--purple-900);
      color: #fff;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .logo span {
      color: var(--purple-200);
    }

    /* CARRITO — el botón ya existe, el contador lo maneja JS */
    #btn-carrito {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--purple-600);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    #btn-carrito:hover { background: var(--purple-400); }

    /* el span interno muestra la cantidad — JS lo actualiza */
    #carrito-count {
      background: #fff;
      color: var(--purple-900);
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 1px 7px;
      min-width: 20px;
      text-align: center;
    }

    /* ── Layout principal ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    .page-title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      color: var(--purple-900);
    }

    /* ── Buscador ── */
    .buscador-wrap {
      margin-bottom: 1.25rem;
    }

    #buscador {
      width: 100%;
      max-width: 420px;
      padding: 10px 14px;
      font-size: 0.9rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    #buscador:focus { border-color: var(--purple-400); }

    /* JS inserta aquí el mensaje de sin resultados */
    #sin-resultados {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-top: 8px;
    }

    /* ── Filtros de categoría ── */
    .filtros {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .filtro-btn {
      padding: 6px 14px;
      font-size: 0.85rem;
      font-weight: 500;
      border: 1px solid var(--border);
      border-radius: 99px;
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .filtro-btn:hover {
      border-color: var(--purple-400);
      color: var(--purple-600);
    }

    /* JS agrega/quita esta clase según el filtro activo */
    .filtro-btn.activo {
      background: var(--purple-600);
      border-color: var(--purple-600);
      color: #fff;
    }

    /* ── Grilla de libros ── */
    /* JS rellena este contenedor con las tarjetas */
    #grilla-libros {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1rem;
    }

    /* ── Tarjeta de libro ── */
    /* JS crea estos elementos con createElement */
    .libro-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 10px;
      cursor: pointer;
      transition: box-shadow 0.15s, transform 0.15s;
      box-shadow: var(--shadow);
    }

    .libro-card:hover {
      box-shadow: 0 4px 16px rgba(83,74,183,0.12);
      transform: translateY(-2px);
    }

    .libro-titulo {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }

    .libro-autor {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    /* Badge de categoría — JS asigna la clase correcta */
    .libro-cat {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 99px;
      width: fit-content;
    }

    .cat-novela  { background: var(--purple-50);  color: var(--purple-900); }
    .cat-ciencia { background: var(--teal-50);    color: var(--teal-600);   }
    .cat-diseno  { background: var(--amber-50);   color: var(--amber-600);  }

    .libro-precio {
      font-size: 1rem;
      font-weight: 700;
      color: var(--purple-600);
      margin-top: auto;
    }

    /* ── Acordeón de reseña (Nivel C) ── */
    /* JS crea y controla esta sección dentro de cada tarjeta */
    .resena-trigger {
      font-size: 0.8rem;
      color: var(--purple-600);
      font-weight: 500;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .resena-trigger::after {
      content: '▾';
      transition: transform 0.2s;
    }

    .resena-trigger[aria-expanded="true"]::after {
      transform: rotate(180deg);
    }

    .resena-cuerpo {
      font-size: 0.8rem;
      color: var(--text-muted);
      line-height: 1.6;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease, padding 0.2s;
    }

    .resena-cuerpo.abierta {
      max-height: 200px;
      padding-top: 6px;
    }

    .btn-agregar {
      font-size: 0.8rem;
      font-weight: 500;
      padding: 7px 12px;
      background: var(--purple-50);
      color: var(--purple-600);
      border: 1px solid var(--purple-200);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.15s;
      width: 100%;
    }

    .btn-agregar:hover {
      background: var(--purple-600);
      color: #fff;
      border-color: var(--purple-600);
    }

    /* ── Modal ── */
    .modal {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* JS agrega/quita esta clase para mostrar/ocultar */
    .modal.oculta { display: none; }

    .modal-overlay {
      position: absolute;
      inset: 0;
      background: rgba(38,33,92,0.45);
    }

    .modal-contenido {
      position: relative;
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 2rem;
      width: min(520px, 92vw);
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    }

    #modal-cerrar {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: var(--bg);
      border: none;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      font-size: 1rem;
      cursor: pointer;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #modal-cerrar:hover { background: var(--gray-100); }

    /* JS rellena este div con el contenido del libro o del carrito/wizard */
    #modal-body { padding-top: 0.5rem; }

    /* Estilos del contenido de la modal de detalle de libro */
    .modal-titulo {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--purple-900);
      margin-bottom: 4px;
      padding-right: 2rem;
    }

    .modal-autor {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .modal-desc {
      font-size: 0.9rem;
      color: var(--text);
      line-height: 1.7;
      margin-bottom: 16px;
    }

    .modal-precio {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--purple-600);
      margin-bottom: 16px;
    }

    .modal-btn-comprar {
      width: 100%;
      padding: 10px;
      background: var(--purple-600);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .modal-btn-comprar:hover { background: var(--purple-900); }

    /* ── Wizard (Nivel B) ── */
    /* JS genera estos elementos dinámicamente dentro de #modal-body */
    .wizard-steps {
      display: flex;
      gap: 0;
      margin-bottom: 1.5rem;
      position: relative;
    }

    .wizard-steps::before {
      content: '';
      position: absolute;
      top: 13px;
      left: 13px;
      right: 13px;
      height: 1px;
      background: var(--gray-100);
    }

    .wizard-step {
      flex: 1;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .wizard-dot {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      margin: 0 auto 4px;
      font-size: 0.75rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* JS asigna estas clases según el paso actual */
    .wizard-dot.done    { background: var(--teal-600);   color: #fff; }
    .wizard-dot.current { background: var(--purple-600); color: #fff; }
    .wizard-dot.pending { background: var(--gray-100);   color: var(--gray-600); }

    .wizard-label {
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .wizard-label.active { color: var(--purple-600); font-weight: 500; }

    .wizard-panel {
      margin-bottom: 1.25rem;
    }

    .wizard-field {
      margin-bottom: 12px;
    }

    .wizard-field label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .wizard-field input,
    .wizard-field select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      color: var(--text);
      background: var(--surface);
      outline: none;
    }

    .wizard-field input:focus,
    .wizard-field select:focus { border-color: var(--purple-400); }

    /* JS inserta mensajes de error aquí */
    .error-msg {
      font-size: 0.78rem;
      color: #A32D2D;
      margin-top: 4px;
    }

    .wizard-btns {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-top: 1rem;
    }

    .wizard-btn {
      flex: 1;
      padding: 9px;
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      transition: all 0.15s;
    }

    .wizard-btn:disabled { opacity: 0.35; cursor: default; }
    .wizard-btn:hover:not(:disabled) { background: var(--bg); }

    .wizard-btn.primary {
      background: var(--purple-600);
      color: #fff;
      border-color: var(--purple-600);
    }

    .wizard-btn.primary:hover:not(:disabled) { background: var(--purple-900); }

    /* ── Carrito — contenido de la modal ── */
    .carrito-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.875rem;
    }

    .carrito-item:last-child { border-bottom: none; }

    .carrito-item-titulo { font-weight: 500; }
    .carrito-item-precio { color: var(--purple-600); font-weight: 600; }

    .carrito-total {
      display: flex;
      justify-content: space-between;
      font-weight: 700;
      font-size: 1rem;
      padding-top: 12px;
      margin-top: 4px;
      border-top: 2px solid var(--purple-200);
      color: var(--purple-900);
    }

    /* ── Toast (Nivel B) ── */
    /* JS crea y destruye estos con createElement + setTimeout */
    #toast-container {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 300;
    }

    .toast {
      padding: 12px 18px;
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      font-weight: 500;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      animation: slideIn 0.25s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .toast.exito   { background: var(--teal-50);   color: var(--teal-600); }
    .toast.error   { background: var(--coral-50);  color: var(--coral-600); }
    .toast.info    { background: var(--purple-50); color: var(--purple-900); }

    /* ── Historial (Nivel C) ── */
    #panel-historial {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1rem;
      margin-top: 2rem;
    }

    .historial-titulo {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }

    /* JS genera los ítems del historial aquí */
    #historial-lista {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .historial-item {
      font-size: 0.85rem;
      color: var(--purple-600);
      cursor: pointer;
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
    }

    .historial-item:last-child { border-bottom: none; }
    .historial-item:hover { color: var(--purple-900); }

    /* ── Estados vacíos ── */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
      font-size: 0.9rem;
      grid-column: 1 / -1;
    }
  </style>
</head>
<body>

  <!-- ═══════════════════════════════════════════
       HEADER — el contador #carrito-count lo actualiza JS
  ════════════════════════════════════════════ -->
  <header>
    <div class="logo">Librería <span>del Sur</span></div>
    <button id="btn-carrito">
      🛒 Carrito
      <span id="carrito-count">0</span>
    </button>
  </header>

  <main>
    <h1 class="page-title">Catálogo de libros</h1>

    <!-- Buscador — Nivel C -->
    <div class="buscador-wrap">
      <input
        type="search"
        id="buscador"
        placeholder="Buscar por título o autor..."
        autocomplete="off"
      >
      <!-- JS inserta aquí el mensaje "Sin resultados para..." -->
    </div>

    <!-- Filtros de categoría -->
    <div class="filtros">
      <button class="filtro-btn activo" data-cat="todos">Todos</button>
      <button class="filtro-btn" data-cat="novela">Novela</button>
      <button class="filtro-btn" data-cat="ciencia">Ciencia</button>
      <button class="filtro-btn" data-cat="diseno">Diseño</button>
    </div>

    <!-- Grilla — JS la rellena con createElement -->
    <div id="grilla-libros"></div>

    <!-- Historial de visitas — Nivel C -->
    <div id="panel-historial">
      <div class="historial-titulo">Visitados recientemente</div>
      <div id="historial-lista">
        <span style="font-size:0.82rem;color:#888780">Todavía no visitaste ningún libro.</span>
      </div>
    </div>
  </main>

  <!-- Modal — JS controla .oculta y rellena #modal-body -->
  <div id="modal" class="modal oculta" aria-hidden="true" role="dialog" aria-modal="true">
    <div class="modal-overlay" id="modal-overlay"></div>
    <div class="modal-contenido">
      <button id="modal-cerrar" aria-label="Cerrar modal">✕</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- Contenedor de toasts — Nivel B -->
  <div id="toast-container" aria-live="polite"></div>

  <!-- ═══════════════════════════════════════════
       JS — completar según nivel de la consigna
  ════════════════════════════════════════════ -->
  <script src="app.js"></script>

</body>
</html>
